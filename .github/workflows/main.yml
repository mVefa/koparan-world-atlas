name: Update World Atlas Data

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00 (UTC) - Türkiye saatiyle 03:00
  workflow_dispatch: # Bu satır "Actions" sekmesinde "Run workflow" butonu çıkarır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Update Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_map.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/src/data/final_map_with_coords.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated data update" && git push)